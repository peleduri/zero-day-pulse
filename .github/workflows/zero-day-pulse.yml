name: Zero Day Pulse

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back for new vulnerabilities'
        default: '24'
        required: false
      max_enrich:
        description: 'Max findings to enrich with Parallel AI'
        default: '10'
        required: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Zero Day Pulse
        env:
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
        run: |
          python main.py \
            --lookback-hours ${{ github.event.inputs.lookback_hours || '24' }} \
            --max-enrich ${{ github.event.inputs.max_enrich || '10' }} \
            --output-dir reports

      - name: Commit reports and HTML dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "pulse: add report $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zero-day-pulse-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Post report to tracking issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');
            const latestMd = path.join('reports', 'latest.md');
            if (!fs.existsSync(latestMd)) {
              console.log('No report generated — skipping issue update');
              return;
            }
            const runUrl    = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pagesUrl  = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            let body = fs.readFileSync(latestMd, 'utf8');
            body += `\n\n---\n[Live dashboard](${pagesUrl}) · [Raw JSON](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/reports/latest.json) · [Action run](${runUrl})`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'zero-day-pulse',
              state:  'open',
              per_page: 1,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body.substring(0, 65000),
              });
              console.log(`Updated tracking issue #${issues[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '🚨 Zero Day Pulse — Active Vulnerability Tracker',
                body:  body.substring(0, 65000),
                labels: ['zero-day-pulse'],
              });
              console.log(`Created tracking issue #${issue.number}`);
            }

  deploy-pages:
    needs: pulse
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
