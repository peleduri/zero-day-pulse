# ── Signal keywords ───────────────────────────────────────────────────────────

zero_day_keywords:
  # Generic zero-day signals
  - zero-day
  - zero day
  - 0-day
  - 0day
  - actively exploited
  - exploited in the wild
  - in the wild
  - no patch
  - unpatched
  - before patch
  - patch bypass
  - nation-state
  - state-sponsored
  # Cloud-specific active exploitation signals
  - cloud breach
  - mass exploitation
  - abuse in the wild
  - attackers are exploiting
  - threat actors exploiting

high_severity_keywords:
  # Generic severity signals
  - critical
  - remote code execution
  - unauthenticated rce
  - pre-auth
  - wormable
  - supply chain
  - backdoor
  # Cloud infrastructure signals
  - container escape
  - container breakout
  - privilege escalation
  - cluster takeover
  - kubernetes
  - lateral movement
  - credential theft
  - iam bypass
  - metadata service
  - imds
  - ssrf
  - exposed secret
  - secret leak
  - token hijack
  - cross-tenant
  - tenant isolation
  # Cloud platform signals
  - aws
  - azure
  - gcp
  - eks
  - gke
  - aks
  - ecr
  - acr
  - cloud run
  - lambda
  - fargate
  # Infrastructure signals
  - terraform
  - helm
  - registry poisoning
  - image poisoning
  - dependency confusion
  - typosquatting

cisa_kev_url: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
