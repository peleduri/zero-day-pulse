# ── Signal keywords ───────────────────────────────────────────────────────────

zero_day_keywords:
  # Generic zero-day signals
  - zero-day
  - zero day
  - 0-day
  - 0day
  - actively exploited
  - exploited in the wild
  - in the wild
  - no patch
  - unpatched
  - before patch
  - patch bypass
  - nation-state
  - state-sponsored
  # Cloud-specific active exploitation signals
  - cloud breach
  - mass exploitation
  - abuse in the wild
  - attackers are exploiting
  - threat actors exploiting
  # AI / agent exploitation signals
  - prompt injection
  - indirect prompt injection
  - tool poisoning
  - agent hijacking
  - jailbreak
  - system prompt leak
  - model exfiltration
  - malicious extension
  - malicious plugin
  - malicious mcp

